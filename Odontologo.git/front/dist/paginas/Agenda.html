<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecciona tu Fecha de Agendamiento</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
        }
        .contenedor-calendario {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
        input[type="date"] {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #007bff;
            border-radius: 6px;
            outline: none;
            color: #333;
            cursor: pointer;
        }
        input[type="date"]:focus {
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="contenedor-calendario">
        <h2>Elige una fecha para tu cita</h2>
        <input type="date" id="calendarioAgendar">
    </div>
    <script>
        const calendario = document.getElementById('calendarioAgendar');

        calendario.addEventListener('change', function() {
            const fechaSeleccionada = this.value; 
            
            if (fechaSeleccionada) {
               
                const urlDestino = `agendar.html?fecha=${fechaSeleccionada}`;
                
                window.location.href = urlDestino;
            }
        });
    </script>

</body>
</html>
